<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mock Checkout</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f5f7fb;margin:0;padding:24px}
    .card{max-width:760px;margin:32px auto;background:#fff;border:1px solid #e5eaf2;border-radius:12px;padding:20px}
    .btn{display:inline-block;padding:10px 14px;background:#111827;color:#fff;border-radius:8px;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h2>Mock Checkout</h2>
    <p>Платежный шлюз пока в режиме заглушки.</p>
    <p>
      <b>Token:</b> {{.Token}}<br>
      <b>Connector:</b> {{.ConnectorID}}<br>
      <b>User:</b> {{.UserID}}<br>
      <b>Amount:</b> {{.Amount}} RUB
    </p>
    <a class="btn" href="{{.SuccessURL}}">Имитировать успешную оплату</a>
  </div>
</body>
</html>
