<!doctype html>
<html lang="{{.Lang}}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · {{index .I18N "login.title"}}</title>
  <link rel="stylesheet" href="/admin/assets/css/pico.min.css">
  <link rel="stylesheet" href="/admin/assets/css/admin.css">
  <style>
    :root {
      --pico-font-family: "Manrope", "Segoe UI", sans-serif;
      --pico-font-size: 90%;
    }
    main.container { max-width: 520px; margin-top: 10vh; }
    .langs { margin-top: .75rem; text-align: right; }
  </style>
</head>
<body>
<main class="container">
  <article class="section-card">
    <span class="page-kicker" style="background:#edf4fb;color:#294866;">Admin Access</span>
    <h1 style="margin-top:.8rem;">{{index .I18N "login.title"}}</h1>
    <p>{{index .I18N "login.subtitle"}}</p>
    {{if .Notice}}<div class="notice">{{.Notice}}</div>{{end}}
    <form method="POST" action="/admin/login?lang={{.Lang}}">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label>
        {{index .I18N "login.token"}}
        <input type="password" name="token" autocomplete="current-password" required>
      </label>
      <input type="hidden" name="next" value="{{.Next}}">
      <button type="submit">{{index .I18N "login.submit"}}</button>
    </form>
    <p><span class="help-tip" tabindex="0" data-tip="{{index .I18N "login.hint"}}">?</span></p>
    <div class="langs">
      <a href="/admin/login?lang=ru{{if .Next}}&next={{urlquery .Next}}{{end}}" {{if eq .Lang "ru"}}aria-current="true"{{end}}>{{index .I18N "lang.ru"}}</a>
      ·
      <a href="/admin/login?lang=en{{if .Next}}&next={{urlquery .Next}}{{end}}" {{if eq .Lang "en"}}aria-current="true"{{end}}>{{index .I18N "lang.en"}}</a>
    </div>
  </article>
</main>
</body>
</html>
